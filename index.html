<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaisyDo - Tailwind Theme Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            color: #6b7280;
            margin-bottom: 1rem;
        }
        
        .header .instructions {
            font-size: 0.875rem;
            color: #9ca3af;
        }
        
        .colors-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            max-width: 64rem;
        }
        
        .color-box {
            position: relative;
            width: 12rem;
            height: 8rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .color-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .lock-icon {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            width: 1.5rem;
            height: 1.5rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        
        .lock-icon:hover {
            opacity: 0.7;
        }
        
        .color-code {
            font-family: 'Courier New', monospace;
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .lock-status {
            font-size: 0.875rem;
            opacity: 0.75;
        }
        
        @media (max-width: 768px) {
            .colors-container {
                flex-direction: column;
                align-items: center;
            }
            
            .color-box {
                width: 16rem;
                height: 6rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>DaisyDo</h1>
        <p>Tailwind Theme Generator</p>
        <p class="instructions">Click the lock icons to lock colors • Press spacebar to randomize</p>
    </div>

    <div class="colors-container">
        <!-- Color boxes will be generated by JavaScript -->
    </div>

    <script src="script.js"></script>
</body>
</html>
